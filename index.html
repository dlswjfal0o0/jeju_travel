<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>여행 정보 정리</title>
    <meta name="description" content="항공권, 렌터카, 추천 장소를 한눈에 보는 읽기 전용 여행 정보 사이트" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="site-nav" aria-label="주요 메뉴">
      <a class="brand" href="#top" aria-label="여행 정보 정리 첫 화면">
        <span id="navTitle">여행 정보</span>
        <small id="navDates">일정</small>
      </a>
      <div class="nav-links" id="navLinks"></div>
    </nav>

    <header id="top" class="hero">
      <img id="heroImage" class="hero-image" src="" alt="" />
      <div class="hero-shade"></div>
      <div class="hero-content">
        <div id="heroMeta" class="meta-pills"></div>
        <p class="eyebrow">Travel Information</p>
        <h1 id="heroTitle"></h1>
        <p id="heroDesc" class="hero-desc"></p>
      </div>
    </header>

    <div class="section-tabs" id="sectionTabs" aria-label="섹션 바로가기"></div>

    <main>
      <section id="flights" class="content-section">
        <p class="eyebrow">Flights</p>
        <h2>항공권</h2>
        <p class="section-copy">예약 정보를 출발 전 바로 확인할 수 있도록 정리했습니다.</p>
        <div id="flightList" class="stack-list"></div>
      </section>

      <section id="rental" class="content-section">
        <p class="eyebrow">Rental Car & Shuttle</p>
        <h2>렌터카</h2>
        <p class="section-copy">차량 예약 정보와 공항 셔틀 탑승 장소를 함께 확인하세요.</p>
        <div id="rentalCard"></div>
        <div id="routeList" class="route-list"></div>
      </section>

      <section id="places" class="content-section">
        <p class="eyebrow">Recommended Places</p>
        <h2>추천 장소</h2>
        <p class="section-copy">식사, 카페, 명소를 분류별로 모았습니다.</p>
        <div class="place-tabs" id="placeTabs" aria-label="추천 장소 분류"></div>
        <div id="placeMap" class="place-map" aria-label="추천 장소 지도"></div>
        <div id="placeList" class="place-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <p id="footerTitle"></p>
        <span id="footerMeta"></span>
      </div>
      <div id="footerLinks" class="footer-links"></div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
